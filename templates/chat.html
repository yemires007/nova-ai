{% extends "base.html" %}
{% block title %}Chat — Nova{% endblock %}

{% block body %}
<main class="wrap chat-wrap">
  <div class="chat-head-row">
    <a href="{{ url_for('index') }}" class="back">← Menu</a>
    <h2>Chat with AI</h2>
  </div>

  <div id="messages" class="messages">
    <div class="msg bot">Hi! I'm Nova. Ask me anything — or try one of the suggestions below.</div>
  </div>

  <div class="suggest" id="suggest">
    <button type="button" data-q="Explain how a neural network learns, simply.">Explain neural nets</button>
    <button type="button" data-q="Give me 5 interview questions for a data science role.">DS interview Qs</button>
    <button type="button" data-q="Write a short cover-letter intro for an ML engineer role.">Cover-letter intro</button>
  </div>

  <form id="chat-form" class="chat-input">
    <textarea id="chat-text" placeholder="Message Nova…" rows="1" autocomplete="off"></textarea>
    <button type="submit" id="send-btn" aria-label="Send">↑</button>
  </form>
  <p class="disclaimer">Nova can make mistakes — double-check important info.</p>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
