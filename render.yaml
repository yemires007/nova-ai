# Render Blueprint — Nova (AI assistant) with a managed Postgres.
# New + -> Blueprint -> connect this repo. Render provisions the DB, wires
# DATABASE_URL, generates SECRET_KEY, and prompts you for GEMINI_API_KEY.
databases:
  - name: nova-db
    plan: free

services:
  - type: web
    name: nova-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nova-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false            # enter your free Google AI Studio key in the dashboard
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: PAYSTACK_SECRET_KEY
        sync: false            # optional — real payments (demo upgrade if blank)
      - key: RESEND_API_KEY
        sync: false            # optional — password-reset email (on-screen link if blank)
      - key: MAIL_FROM
        sync: false            # optional — verified Resend sender address
